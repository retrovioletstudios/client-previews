<!DOCTYPE html>
<html lang="en" style="scroll-behavior: smooth;">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="format-detection" content="telephone=no"/>
<title>Austin's Best Mobile Mechanic | Master Auto Repair</title>
<meta name="description" content="Master Craftsmanship, Delivered to Your Door. Roberto brings 35 years of expert auto repair experience directly to your driveway."/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --accent: #51d0de; 
    --accent-hover: #3ebbc9;
    --bg-white: #FFFFFF; 
    --bg-alt: #F4F8FA; 
    --text-main: #0F172A; 
    --text-gray: #475569; 
    --radius: 16px; 
    --font-head: 'Montserrat', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  html, body { overflow-x: hidden; width: 100%; }
  body { font-family: var(--font-body); background: var(--bg-white); color: var(--text-main); -webkit-font-smoothing: antialiased; }

  a[href^="tel"], a[href^="http"] { color: inherit; text-decoration: none; transition: opacity 0.2s; }
  a:hover { opacity: 0.8; }
  .text-accent-link { color: var(--accent-hover) !important; font-weight: 700; cursor: pointer; text-decoration: none;}

  .fade-in-up { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease-out, transform 0.8s ease-out; will-change: opacity, transform; }
  .fade-in-up.in-view { opacity: 1; transform: translateY(0); }
  .delay-1 { transition-delay: 0.1s; }
  .delay-2 { transition-delay: 0.2s; }

  .promo-banner { background: var(--text-main); color: #FFF; text-align: center; padding: 12px 20px; font-family: var(--font-body); font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; position: relative; z-index: 101; }
  .promo-banner span { color: var(--accent); font-weight: 800; }

  /* DESKTOP NAVIGATION */
  nav {
    background: rgba(255, 255, 255, 0.98); border-bottom: 1px solid #E2E8F0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 5%; height: 80px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text-main); cursor: pointer;}
  .nav-logo img { height: 48px; width: auto; border-radius: 6px; }
  .nav-logo-text { font-family: var(--font-head); font-size: 20px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; line-height: 1.1; }
  .nav-logo-text span { color: var(--accent-hover); display: block; font-size: 14px; font-family: var(--font-body); letter-spacing: 2px; margin-top: 2px;}
  
  .nav-links { display: flex; gap: 2.5rem; }
  .nav-links a { font-family: var(--font-body); font-size: 14px; font-weight: 600; color: var(--text-gray); text-decoration: none; cursor: pointer; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent-hover); }
  
  .nav-cta { background: var(--text-main); color: #FFF; font-family: var(--font-body); font-weight: 700; font-size: 13px; letter-spacing: 0.5px; text-transform: uppercase; border: none; padding: 12px 28px; cursor: pointer; border-radius: 50px; transition: all 0.3s;}
  .nav-cta:hover { background: var(--accent); color: #0F172A; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(81, 208, 222, 0.4); }

  /* MOBILE BOTTOM APP BAR */
  .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid rgba(226, 232, 240, 0.6); z-index: 999; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -4px 25px rgba(15, 23, 42, 0.08); }
  .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px 0; color: #94A3B8; text-decoration: none; cursor: pointer; transition: color 0.2s;}
  .mobile-nav-item svg { width: 22px; height: 22px; margin-bottom: 4px; }
  .mobile-nav-item span { font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;}
  .mobile-nav-item.active { color: var(--accent-hover); }
  .mobile-nav-item.active svg { color: var(--accent-hover); }

  .page { display: none; opacity: 0; transition: opacity 0.4s ease; }
  .page.active { display: block; opacity: 1; }

  .hero-content, .hero-img-container, .bento-card, .service-big-card, .feature-content, .contact-wrapper, .badge-card { min-width: 0; word-wrap: break-word; }

  /* SPLIT HERO SECTION */
  .hero { 
    padding: 6rem 5% 6rem; 
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4rem;
    align-items: center;
    background: var(--bg-white);
    max-width: 1400px;
    margin: 0 auto;
  }
  
  .hero-tag { display: inline-block; background: rgba(81, 208, 222, 0.15); color: #0F172A; font-family: var(--font-body); font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 16px; margin-bottom: 1.5rem; border-radius: 50px; }
  .hero h1 { font-family: var(--font-head); font-size: clamp(40px, 5vw, 64px); font-weight: 800; line-height: 1.1; letter-spacing: -1.5px; margin-bottom: 1.5rem; color: var(--text-main); }
  .hero h1 em { color: var(--accent-hover); font-style: normal; }
  .hero-sub { font-size: 18px; color: var(--text-gray); line-height: 1.7; margin-bottom: 2.5rem; font-weight: 400; max-width: 500px;}
  
  .hero-btns { display: flex; gap: 1rem; flex-wrap: wrap; }
  
  .btn-primary { background: var(--text-main); color: #FFF; font-family: var(--font-body); font-weight: 700; font-size: 16px; border: none; padding: 18px 40px; cursor: pointer; transition: all 0.3s; border-radius: 50px;}
  .btn-primary:hover { background: var(--accent); color: #0F172A; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(81, 208, 222, 0.4); }
  .btn-outline { background: transparent; color: var(--text-main); font-family: var(--font-body); font-weight: 600; font-size: 16px; border: 2px solid #E2E8F0; padding: 16px 40px; cursor: pointer; transition: all 0.2s; border-radius: 50px;}
  .btn-outline:hover { border-color: var(--text-main); background: #F8FAFC; }

  .hero-img-container { position: relative; }
  
  /* UPDATED: Embedded Hero Video Styling */
  .hero-video { width: 100%; height: auto; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); object-fit: cover; aspect-ratio: 4/3; }
  
  .trust-strip { background: var(--bg-alt); padding: 3rem 5%; border-top: 1px solid #E2E8F0; border-bottom: 1px solid #E2E8F0; display: flex; justify-content: center; gap: 4rem; flex-wrap: wrap; align-items: center; }
  .trust-item { display: flex; align-items: center; gap: 12px; font-family: var(--font-head); font-weight: 700; font-size: 18px; color: var(--text-gray); }
  .trust-item svg { color: var(--accent-hover); flex-shrink: 0;}

  .section { padding: 6rem 5%; }
  .section-inner { max-width: 1200px; margin: 0 auto; }
  .section-header { text-align: center; max-width: 700px; margin: 0 auto 4rem auto; }
  .section-label { font-family: var(--font-body); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--accent-hover); margin-bottom: 1rem; display: block; }
  .section-title { font-family: var(--font-head); font-size: clamp(32px, 4vw, 48px); font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 1.5rem; color: var(--text-main); }
  .section-sub { font-size: 18px; color: var(--text-gray); line-height: 1.7; }

  .bento-grid { display: grid; gap: 2rem; text-align: left; }
  .bento-card { background: var(--bg-white); padding: 3rem 2.5rem; border-radius: var(--radius); transition: all 0.3s; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05); border: 1px solid rgba(0,0,0,0.02); position: relative;}
  .bento-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08); z-index: 2;}
  
  .capabilities-bento { grid-template-columns: repeat(4, 1fr); }
  .focus-bento { grid-template-columns: repeat(3, 1fr); }
  
  .bento-feat-img { padding: 0; border: none; box-shadow: none; background: transparent; }
  .bento-feat-img.span-2 { grid-column: span 2; }
  .bento-img-asset { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05);}
  
  .service-tag { position: absolute; top: 2rem; right: 2.5rem; background: rgba(81, 208, 222, 0.15); color: var(--accent-hover); font-family: var(--font-body); font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; padding: 6px 12px; border-radius: 50px;}
  .service-icon { background: rgba(81, 208, 222, 0.15); width: 60px; height: 60px; border-radius: 16px; display: flex; align-items: center; justify-content: center; color: var(--accent-hover); margin-bottom: 2rem; }
  
  .bento-name { font-family: var(--font-head); font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: var(--text-main); margin-bottom: 1rem; }
  .bento-desc { font-size: 15px; color: var(--text-gray); line-height: 1.7; }
  .why-stat-num { font-family: var(--font-head); font-size: 42px; font-weight: 800; letter-spacing: -1px; color: var(--accent-hover); line-height: 1; margin-bottom: 0.75rem; text-transform: uppercase; }

  /* SERVICES PAGE */
  .services-page-hero { background: var(--bg-alt); border-bottom: 1px solid #E2E8F0; padding: 7rem 5% 6rem; text-align: center; }
  
  .services-big-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2.5rem; margin-top: 3.5rem; text-align: left;}
  
  .service-big-card { background: var(--bg-white); padding: 3rem 2.5rem; border-radius: var(--radius); transition: all 0.3s; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.05); border: 1px solid rgba(0,0,0,0.02); position: relative; }
  .service-big-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(15, 23, 42, 0.08); }
  
  .service-tag-pop { position: absolute; top: -14px; right: 24px; background: var(--text-main); color: #FFF; font-family: var(--font-sub); font-size: 10px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase; padding: 8px 16px; border-radius: 50px; box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);}
  
  .service-name-big { font-family: var(--font-head); font-size: 26px; font-weight: 700; letter-spacing: -0.5px; color: var(--text-main); margin-bottom: 0.75rem; }
  .service-features { list-style: none; margin: 2rem 0; }
  .service-features li { font-size: 14px; color: var(--text-gray); padding: 12px 0; border-bottom: 1px solid #F1F5F9; display: flex; align-items: center; gap: 12px; }
  .service-features li:last-child { border-bottom: none; }
  .service-features li::before { content: '✓'; color: var(--accent-hover); font-weight: 700; font-size: 16px; }

  .faq-container { max-width: 800px; margin: 4rem auto 0; text-align: left; }
  .faq-item { border-bottom: 1px solid #E2E8F0; padding: 1.75rem 0; cursor: pointer; transition: background 0.3s; }
  .faq-item:hover { background: #F8FAFC; }
  .faq-question { display: flex; justify-content: space-between; align-items: center; font-family: var(--font-head); font-size: 18px; font-weight: 600; letter-spacing: -0.2px; color: var(--text-main); }
  .faq-icon { color: var(--accent-hover); font-size: 22px; font-weight: 300; transition: transform 0.3s ease; }
  .faq-answer { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1); color: var(--text-gray); font-size: 15px; line-height: 1.7; }
  .faq-item.active .faq-answer { max-height: 250px; margin-top: 1rem; }
  .faq-item.active .faq-icon { transform: rotate(45deg); }

  .parallax-banner {
    background: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), url('https://retrovioletstudios.github.io/client-previews/rollingtirebright.jpeg') center/cover fixed;
    padding: 7rem 5%;
    text-align: center;
    margin-top: 5rem;
  }
  
  .parallax-banner .btn-primary { border: 2px solid var(--accent); }

  /* ABOUT PAGE */
  .about-container { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
  .about-img-wrapper { text-align: center; } 
  .about-img { width: 100%; max-width: 420px; height: auto; border-radius: var(--radius); box-shadow: 0 20px 40px rgba(0,0,0,0.1); aspect-ratio: 1/1; object-fit: cover; display: inline-block;}
  
  .about-text p { font-size: 17px; color: var(--text-gray); line-height: 1.8; margin-bottom: 1.5rem; }
  
  .feature-list { margin-top: 2.5rem; }
  .feature-item { display: flex; gap: 1.25rem; margin-bottom: 1.5rem; }
  .feature-icon { background: rgba(81, 208, 222, 0.15); color: var(--accent-hover); width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .feature-content h4 { font-family: var(--font-head); font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--text-main); }
  .feature-content p { font-size: 15px; color: var(--text-gray); line-height: 1.6; margin-bottom: 0; }

  .about-bottom-bar { display: flex; flex-wrap: wrap; gap: 2rem; align-items: center; margin-top: 4rem; justify-content: space-between; border-top: 1px solid #E2E8F0; padding-top: 4rem; }
  .trust-badges { display: flex; gap: 1.5rem; flex: 1; flex-wrap: wrap; justify-content: flex-start; }
  .badge-card { background: var(--bg-white); border: 1px solid #E2E8F0; padding: 1.5rem 2rem; border-radius: 16px; display: flex; align-items: center; gap: 15px; flex: 1; min-width: 240px; text-align: left; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.04);}
  .badge-icon { font-size: 32px; color: var(--accent-hover); display: flex; align-items: center; justify-content: center; }
  .badge-title { font-family: var(--font-head); font-weight: 800; font-size: 16px; color: var(--text-main); margin-bottom: 2px;}
  .badge-sub { font-size: 13px; color: var(--text-gray); }

  .press-section { padding: 4rem 5%; background: var(--bg-alt); text-align: center; border-top: 1px solid #E2E8F0; border-bottom: 1px solid #E2E8F0;}
  .press-title { font-family: var(--font-body); font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--text-gray); margin-bottom: 4rem; }
  .press-grid { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; align-items: center; max-width: 1000px; margin: 0 auto; }
  .press-logo { font-family: var(--font-head); font-size: 20px; font-weight: 800; color: #94A3B8; letter-spacing: -0.5px; transition: all 0.3s; }
  .press-logo:hover { color: var(--text-main); }

  /* CONTACT / WRENCH INTEGRATION */
  .contact-wrapper { display: grid; grid-template-columns: 1fr 1.2fr; gap: 5rem; background: var(--bg-white); border-radius: 32px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.05); overflow: hidden; border: 1px solid #E2E8F0; }
  .contact-info { background: var(--text-main); color: var(--bg-white); padding: 4rem; }
  .contact-info h3 { font-family: var(--font-head); font-size: 28px; margin-bottom: 1.5rem; color: var(--bg-white); }
  .contact-info p { color: #94A3B8; line-height: 1.7; margin-bottom: 3rem; }
  
  .info-row { display: flex; align-items: flex-start; gap: 1.5rem; margin-bottom: 2rem; }
  .info-icon { color: var(--accent); }
  .info-text h5 { font-family: var(--font-body); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #94A3B8; margin-bottom: 4px; }
  .info-text p { color: var(--bg-white); font-size: 18px; font-weight: 500; margin-bottom: 0; }
  
  .form-container { padding: 4rem; }
  .form-group { margin-bottom: 1.5rem; }
  .form-label { display: block; font-family: var(--font-body); font-size: 13px; font-weight: 600; color: var(--text-main); margin-bottom: 8px; }
  .form-input, .form-select, .form-textarea { width: 100%; background: #F8FAFC; border: 1px solid #E2E8F0; color: var(--text-main); font-family: var(--font-body); font-size: 15px; padding: 16px; outline: none; transition: all 0.2s; border-radius: 8px;}
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent-hover); background: #FFF; box-shadow: 0 0 0 4px rgba(81, 208, 222, 0.1); }
  .form-textarea { resize: vertical; min-height: 120px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
  .submit-confirm { background: #DCFCE7; border: 1px solid #86EFAC; color: #166534; padding: 1.25rem; font-family: var(--font-body); font-weight: 500; font-size: 15px; margin-top: 1.5rem; display: none; text-align: center; border-radius: 8px;}

  .map-container { margin-top: 5rem; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }

  /* FOOTER */
  footer { background: var(--bg-alt); padding: 5rem 5% 5rem; text-align: center; color: var(--text-gray); border-top: 1px solid #E2E8F0;}
  .footer-logo { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; margin-bottom: 1.5rem; cursor: pointer;}
  .footer-logo img { height: 40px; width: auto; border-radius: 4px;}
  .footer-logo-text { font-family: var(--font-head); font-size: 22px; font-weight: 800; color: var(--text-main); text-transform: uppercase; text-align: left; line-height: 1.1;}
  .footer-logo-text span { color: var(--accent-hover); display: block; font-size: 12px; letter-spacing: 2px;}
  
  .footer-nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 2.5rem; margin: 2rem 0; border-top: 1px solid #E2E8F0; padding-top: 3rem; }
  .footer-nav a { font-family: var(--font-body); font-size: 14px; font-weight: 500; color: #94A3B8; text-decoration: none; transition: color 0.2s; cursor: pointer;}
  .footer-nav a:hover {
